<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="mdstitch">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0E1116"/>
      <stop offset="1" stop-color="#161B22"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <rect x="6" y="6" width="500" height="500" rx="90" fill="none" stroke="#30363D" stroke-width="1.5"/>

  <!-- wordmark — explicit baseline y for reliable vertical centering -->
  <text x="256" y="278"
        font-family="'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif"
        font-weight="800" font-size="96" letter-spacing="-3"
        text-anchor="middle">
    <tspan fill="#F0F6FC">md</tspan><tspan fill="#7EE787">stitch</tspan>
  </text>
</svg>
