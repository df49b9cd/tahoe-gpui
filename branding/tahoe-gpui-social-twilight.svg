<svg viewBox="0 0 1280 640" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="ambientGlowTw" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#5c7aa8" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background: deep twilight -->
  <rect width="1280" height="640" fill="#040819"/>

  <!-- Ambient glow behind icon -->
  <ellipse cx="340" cy="320" rx="520" ry="380" fill="url(#ambientGlowTw)"/>

  <!-- Scattered stars on the right side -->
  <g fill="#ffffff">
    <circle cx="820"  cy="90"  r="1.5" opacity="0.6"/>
    <circle cx="900"  cy="140" r="1"   opacity="0.4"/>
    <circle cx="1020" cy="100" r="1.5" opacity="0.7"/>
    <circle cx="1150" cy="200" r="1"   opacity="0.35"/>
    <circle cx="1100" cy="80"  r="2"   opacity="0.85"/>
    <circle cx="960"  cy="55"  r="1"   opacity="0.5"/>
    <circle cx="880"  cy="240" r="1"   opacity="0.35"/>
    <circle cx="1220" cy="130" r="1.2" opacity="0.55"/>
    <circle cx="790"  cy="180" r="1"   opacity="0.3"/>
  </g>

  <!-- Icon (twilight) as nested SVG -->
  <svg x="80" y="80" width="480" height="480" viewBox="0 0 512 512">
    <defs>
      <linearGradient id="tw_sky" x1="50%" y1="0%" x2="50%" y2="100%">
        <stop offset="0%"   stop-color="#23406b"/>
        <stop offset="50%"  stop-color="#0e1c36"/>
        <stop offset="100%" stop-color="#040819"/>
      </linearGradient>
      <radialGradient id="tw_glow" cx="50%" cy="50%" r="50%">
        <stop offset="0%"  stop-color="#ffffff" stop-opacity="0.5"/>
        <stop offset="55%" stop-color="#a8c8ff" stop-opacity="0.15"/>
        <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
      </radialGradient>
      <linearGradient id="tw_peakGlass" x1="50%" y1="0%" x2="50%" y2="100%">
        <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.95"/>
        <stop offset="55%"  stop-color="#dfe7f4" stop-opacity="0.55"/>
        <stop offset="100%" stop-color="#ffffff" stop-opacity="0.20"/>
      </linearGradient>
      <linearGradient id="tw_backPeak" x1="50%" y1="0%" x2="50%" y2="100%">
        <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.38"/>
        <stop offset="100%" stop-color="#ffffff" stop-opacity="0.08"/>
      </linearGradient>
      <linearGradient id="tw_water" x1="50%" y1="0%" x2="50%" y2="100%">
        <stop offset="0%"   stop-color="#3a7ab8" stop-opacity="0.38"/>
        <stop offset="100%" stop-color="#060e20" stop-opacity="0"/>
      </linearGradient>
      <linearGradient id="tw_reflection" x1="50%" y1="0%" x2="50%" y2="100%">
        <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.38"/>
        <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
      </linearGradient>
      <linearGradient id="tw_sheen" x1="50%" y1="0%" x2="50%" y2="100%">
        <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.12"/>
        <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
      </linearGradient>
      <clipPath id="tw_iconClip">
        <rect width="512" height="512" rx="112"/>
      </clipPath>
      <clipPath id="tw_waterClip">
        <rect x="0" y="340" width="512" height="172"/>
      </clipPath>
    </defs>
    <rect width="512" height="512" rx="112" fill="url(#tw_sky)"/>
    <g clip-path="url(#tw_iconClip)">
      <circle cx="180" cy="170" r="170" fill="url(#tw_glow)"/>
      <path d="M 0 340 L 60 268 L 132 296 L 210 238 L 284 280 L 360 244 L 440 284 L 512 252 L 512 340 Z"
            fill="url(#tw_backPeak)"/>
      <path d="M 40 340 L 170 220 L 230 150 L 300 240 L 370 180 L 470 340 Z"
            fill="url(#tw_peakGlass)"/>
      <path d="M 214 175 L 230 150 L 252 184 L 240 196 L 222 190 Z"
            fill="#ffffff" opacity="0.95"/>
      <path d="M 170 220 L 230 150" stroke="#ffffff" stroke-opacity="0.9"
            stroke-width="2.5" stroke-linecap="round" fill="none"/>
      <path d="M 300 240 L 370 180" stroke="#ffffff" stroke-opacity="0.7"
            stroke-width="2" stroke-linecap="round" fill="none"/>
      <line x1="0" y1="340" x2="512" y2="340" stroke="#ffffff" stroke-opacity="0.5" stroke-width="1.2"/>
      <rect x="0" y="340" width="512" height="172" fill="url(#tw_water)"/>
      <g clip-path="url(#tw_waterClip)" opacity="0.5">
        <path d="M 40 340 L 170 460 L 230 530 L 300 440 L 370 500 L 470 340 Z"
              fill="url(#tw_reflection)"/>
      </g>
      <g stroke="#ffffff" stroke-linecap="round" fill="none">
        <line x1="70"  y1="378" x2="178" y2="378" stroke-opacity="0.22" stroke-width="1"/>
        <line x1="340" y1="394" x2="446" y2="394" stroke-opacity="0.18" stroke-width="1"/>
        <line x1="140" y1="418" x2="268" y2="418" stroke-opacity="0.15" stroke-width="1"/>
        <line x1="300" y1="444" x2="398" y2="444" stroke-opacity="0.12" stroke-width="1"/>
        <line x1="60"  y1="466" x2="154" y2="466" stroke-opacity="0.1"  stroke-width="1"/>
      </g>
      <rect x="0" y="0" width="512" height="220" fill="url(#tw_sheen)"/>
    </g>
  </svg>

  <!-- Title and tagline -->
  <text x="640" y="305" fill="#ffffff" font-family="Inter, sans-serif" font-size="90" font-weight="700" letter-spacing="-2.5">tahoe-gpui</text>
  <text x="642" y="365" fill="#a0b4d0" font-family="Inter, sans-serif" font-size="30" font-weight="400">Translucent. Layered. Native.</text>
  <text x="642" y="410" fill="#6a7a94" font-family="Inter, sans-serif" font-size="22" font-weight="400">Based on GPUI</text>
</svg>
