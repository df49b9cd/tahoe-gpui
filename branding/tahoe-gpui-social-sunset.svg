<svg viewBox="0 0 1280 640" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="ambientGlowSs" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#c87860" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="socialSkySs" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%"   stop-color="#0b0320"/>
      <stop offset="100%" stop-color="#1a0a2a"/>
    </linearGradient>
  </defs>

  <!-- Background: very deep purple-black with subtle vertical gradient -->
  <rect width="1280" height="640" fill="url(#socialSkySs)"/>

  <!-- Warm ambient glow behind icon -->
  <ellipse cx="340" cy="320" rx="540" ry="400" fill="url(#ambientGlowSs)"/>

  <!-- A few distant stars, warm tinted -->
  <g fill="#ffd6a8">
    <circle cx="850"  cy="100" r="1.3" opacity="0.5"/>
    <circle cx="980"  cy="80"  r="1.8" opacity="0.7"/>
    <circle cx="1100" cy="140" r="1"   opacity="0.4"/>
    <circle cx="1200" cy="90"  r="1.2" opacity="0.55"/>
    <circle cx="900"  cy="210" r="1"   opacity="0.3"/>
    <circle cx="1060" cy="240" r="1"   opacity="0.3"/>
  </g>

  <!-- Icon (sunset) as nested SVG -->
  <svg x="80" y="80" width="480" height="480" viewBox="0 0 512 512">
    <defs>
      <linearGradient id="ss_sky" x1="50%" y1="0%" x2="50%" y2="100%">
        <stop offset="0%"   stop-color="#1b0d3d"/>
        <stop offset="32%"  stop-color="#5c2863"/>
        <stop offset="62%"  stop-color="#c15860"/>
        <stop offset="86%"  stop-color="#ee8a55"/>
        <stop offset="100%" stop-color="#f7b57a"/>
      </linearGradient>
      <radialGradient id="ss_sunHalo" cx="50%" cy="50%" r="50%">
        <stop offset="0%"   stop-color="#fff1c9" stop-opacity="0.85"/>
        <stop offset="35%"  stop-color="#ffc878" stop-opacity="0.45"/>
        <stop offset="75%"  stop-color="#ff8a5c" stop-opacity="0.12"/>
        <stop offset="100%" stop-color="#ff8a5c" stop-opacity="0"/>
      </radialGradient>
      <radialGradient id="ss_sunCore" cx="50%" cy="50%" r="50%">
        <stop offset="0%"   stop-color="#ffffff" stop-opacity="1"/>
        <stop offset="45%"  stop-color="#ffecb0" stop-opacity="1"/>
        <stop offset="100%" stop-color="#ffb560" stop-opacity="0"/>
      </radialGradient>
      <linearGradient id="ss_peak" x1="50%" y1="0%" x2="50%" y2="100%">
        <stop offset="0%"   stop-color="#4d2550" stop-opacity="0.55"/>
        <stop offset="55%"  stop-color="#2b1238" stop-opacity="0.82"/>
        <stop offset="100%" stop-color="#0e0520" stop-opacity="0.95"/>
      </linearGradient>
      <linearGradient id="ss_backPeak" x1="50%" y1="0%" x2="50%" y2="100%">
        <stop offset="0%"   stop-color="#6a3a6a" stop-opacity="0.28"/>
        <stop offset="100%" stop-color="#2b1238" stop-opacity="0.62"/>
      </linearGradient>
      <linearGradient id="ss_water" x1="50%" y1="0%" x2="50%" y2="100%">
        <stop offset="0%"   stop-color="#e5764a" stop-opacity="0.55"/>
        <stop offset="55%"  stop-color="#6f2540" stop-opacity="0.4"/>
        <stop offset="100%" stop-color="#0b0418" stop-opacity="0"/>
      </linearGradient>
      <linearGradient id="ss_reflection" x1="50%" y1="0%" x2="50%" y2="100%">
        <stop offset="0%"   stop-color="#6d2e4c" stop-opacity="0.6"/>
        <stop offset="100%" stop-color="#1a0818" stop-opacity="0"/>
      </linearGradient>
      <linearGradient id="ss_glint" x1="50%" y1="0%" x2="50%" y2="100%">
        <stop offset="0%"   stop-color="#ffecb0" stop-opacity="0.75"/>
        <stop offset="100%" stop-color="#ffecb0" stop-opacity="0"/>
      </linearGradient>
      <linearGradient id="ss_glintCore" x1="50%" y1="0%" x2="50%" y2="100%">
        <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.75"/>
        <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
      </linearGradient>
      <linearGradient id="ss_sheen" x1="50%" y1="0%" x2="50%" y2="100%">
        <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.1"/>
        <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
      </linearGradient>
      <clipPath id="ss_iconClip">
        <rect width="512" height="512" rx="112"/>
      </clipPath>
      <clipPath id="ss_waterClip">
        <rect x="0" y="340" width="512" height="172"/>
      </clipPath>
    </defs>
    <rect width="512" height="512" rx="112" fill="url(#ss_sky)"/>
    <g clip-path="url(#ss_iconClip)">
      <rect x="0" y="240" width="512" height="180" fill="url(#ss_sunHalo)" opacity="0.35"/>
      <circle cx="380" cy="250" r="200" fill="url(#ss_sunHalo)"/>
      <path d="M 0 340 L 60 268 L 132 296 L 210 238 L 284 280 L 360 244 L 440 284 L 512 252 L 512 340 Z"
            fill="url(#ss_backPeak)"/>
      <circle cx="395" cy="218" r="38" fill="url(#ss_sunCore)"/>
      <path d="M 40 340 L 170 220 L 230 150 L 300 240 L 370 180 L 470 340 Z"
            fill="url(#ss_peak)"/>
      <path d="M 214 175 L 230 150 L 252 184 L 240 196 L 222 190 Z"
            fill="#ffdcb0" opacity="0.88"/>
      <path d="M 170 220 L 230 150" stroke="#ffd68a" stroke-opacity="0.95"
            stroke-width="2.5" stroke-linecap="round" fill="none"/>
      <path d="M 300 240 L 370 180" stroke="#ffd68a" stroke-opacity="0.8"
            stroke-width="2" stroke-linecap="round" fill="none"/>
      <line x1="0" y1="340" x2="512" y2="340" stroke="#ffcfa0" stroke-opacity="0.6" stroke-width="1.2"/>
      <rect x="0" y="340" width="512" height="172" fill="url(#ss_water)"/>
      <rect x="372" y="340" width="46" height="150" fill="url(#ss_glint)"/>
      <rect x="386" y="340" width="18" height="150" fill="url(#ss_glintCore)"/>
      <g clip-path="url(#ss_waterClip)" opacity="0.55">
        <path d="M 40 340 L 170 460 L 230 530 L 300 440 L 370 500 L 470 340 Z"
              fill="url(#ss_reflection)"/>
      </g>
      <g stroke="#ffd6a4" stroke-linecap="round" fill="none">
        <line x1="70"  y1="378" x2="178" y2="378" stroke-opacity="0.3"  stroke-width="1"/>
        <line x1="200" y1="394" x2="306" y2="394" stroke-opacity="0.22" stroke-width="1"/>
        <line x1="140" y1="418" x2="268" y2="418" stroke-opacity="0.18" stroke-width="1"/>
        <line x1="40"  y1="444" x2="138" y2="444" stroke-opacity="0.14" stroke-width="1"/>
        <line x1="430" y1="466" x2="502" y2="466" stroke-opacity="0.12" stroke-width="1"/>
      </g>
      <rect x="0" y="0" width="512" height="220" fill="url(#ss_sheen)"/>
    </g>
  </svg>

  <!-- Title and tagline -->
  <text x="640" y="305" fill="#ffffff" font-family="Inter, sans-serif" font-size="90" font-weight="700" letter-spacing="-2.5">tahoe-gpui</text>
  <text x="642" y="365" fill="#f4cfa0" font-family="Inter, sans-serif" font-size="30" font-weight="400">Translucent. Layered. Native.</text>
  <text x="642" y="410" fill="#b08872" font-family="Inter, sans-serif" font-size="22" font-weight="400">Based on GPUI</text>
</svg>
