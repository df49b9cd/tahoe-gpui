[profile.default]
# Number of concurrent test threads (cap at 4 to tame GPUI fixture cost).
test-threads = 4
retries = 0

# Slow tests threshold: warn if a test takes longer than this
slow-timeout = "60s"

[profile.ci]
# CI runs wider and retries flakes twice with 50ms backoff per nextest docs.
test-threads = 8
retries = { backoff = "fixed", count = 2, delay = "50ms" }
